name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_REPLACE_REGISTRY_HOST: always

jobs:
  supply-chain:
    name: Supply-chain audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 26.4.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install pinned npm
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Verify npm version
        run: test "$(npm --version)" = "12.0.1"

      - name: Verify release delivery contracts
        run: npm --prefix web run check:release-contracts

      - name: Install locked web dependencies without scripts
        run: npm --prefix web ci --ignore-scripts

      - name: Audit known vulnerabilities
        run: npm --prefix web audit --audit-level=high

      - name: Verify registry signatures
        run: npm --prefix web audit signatures

  web:
    name: ASTRYX web
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 26.4.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install pinned npm
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Verify npm version
        run: test "$(npm --version)" = "12.0.1"

      - name: Install locked web dependencies without scripts
        run: npm --prefix web ci --ignore-scripts

      - name: Check ASTRYX package interface
        run: npm --prefix web run astryx:check

      - name: Type-check web application
        run: npm --prefix web run typecheck

      - name: Run Vitest suite
        run: npm --prefix web run test:ci

      - name: Build production web bundle
        run: npm --prefix web run build

  rust:
    name: Rust foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: raindrop_test
          POSTGRES_USER: raindrop
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U raindrop -d raindrop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: raindrop_test
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306/tcp
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable snapshot
        with:
          toolchain: 1.94.0
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Restore Cargo cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Configure masked RSS test database URLs
        env:
          POSTGRES_TEST_PORT: ${{ job.services.postgres.ports['5432'] }}
          MYSQL_TEST_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          postgres_url="postgres://raindrop@127.0.0.1:"
          postgres_url+="${POSTGRES_TEST_PORT}/raindrop_test"
          mysql_url="mysql://root@127.0.0.1:"
          mysql_url+="${MYSQL_TEST_PORT}/raindrop_test"

          printf '::add-mask::%s\n' "${postgres_url}"
          printf '::add-mask::%s\n' "${mysql_url}"
          printf 'RAINDROP_TEST_POSTGRES_URL=%s\n' "${postgres_url}" >> "${GITHUB_ENV}"
          printf 'RAINDROP_TEST_MYSQL_URL=%s\n' "${mysql_url}" >> "${GITHUB_ENV}"

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Verify official AI guest target
        run: cargo check --locked --manifest-path plugins/official/raindrop-ai-content/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Execute real official AI component
        run: cargo test --locked --test official_ai_component -- --nocapture --test-threads=1

      - name: Verify RSS schema on SQLite
        run: cargo test --locked --test rss_migrations sqlite -- --nocapture --test-threads=1

      - name: Verify RSS schema on PostgreSQL
        run: cargo test --locked --test rss_migrations postgres -- --nocapture --test-threads=1

      - name: Verify RSS schema on MySQL
        run: cargo test --locked --test rss_migrations mysql -- --nocapture --test-threads=1

      - name: Verify AI provider storage on SQLite
        run: cargo test --locked --test ai_provider_storage sqlite -- --nocapture --test-threads=1

      - name: Verify AI provider storage on PostgreSQL
        run: cargo test --locked --test ai_provider_storage postgres -- --nocapture --test-threads=1

      - name: Verify AI provider storage on MySQL
        run: cargo test --locked --test ai_provider_storage mysql -- --nocapture --test-threads=1

      - name: Verify content jobs and artifacts on SQLite
        run: cargo test --locked --test content_job_backend_contracts sqlite -- --nocapture --test-threads=1

      - name: Verify content jobs and artifacts on PostgreSQL
        run: cargo test --locked --test content_job_backend_contracts postgres -- --nocapture --test-threads=1

      - name: Verify content jobs and artifacts on MySQL
        run: cargo test --locked --test content_job_backend_contracts mysql -- --nocapture --test-threads=1

      - name: Verify refresh claims on SQLite
        run: cargo test --locked --test feed_refresh_claims sqlite -- --nocapture --test-threads=1

      - name: Verify refresh claims on PostgreSQL
        run: cargo test --locked --test feed_refresh_claims postgres -- --nocapture --test-threads=1

      - name: Verify refresh claims on MySQL
        run: cargo test --locked --test feed_refresh_claims mysql -- --nocapture --test-threads=1

      - name: Verify feed recovery and scheduling on PostgreSQL
        run: cargo test --locked --all-features --test feed_runtime postgres_recovery_and_scheduler_contract -- --nocapture --test-threads=1

      - name: Verify feed recovery and scheduling on MySQL
        run: cargo test --locked --all-features --test feed_runtime mysql_recovery_and_scheduler_contract -- --nocapture --test-threads=1

      - name: Verify entry persistence on SQLite
        run: cargo test --locked --test feed_entry_persistence sqlite -- --nocapture --test-threads=1

      - name: Verify entry persistence on PostgreSQL
        run: cargo test --locked --test feed_entry_persistence postgres -- --nocapture --test-threads=1

      - name: Verify entry persistence on MySQL
        run: cargo test --locked --test feed_entry_persistence mysql -- --nocapture --test-threads=1

      - name: Verify lifecycle outbox on SQLite
        run: cargo test --locked --test feed_lifecycle_outbox sqlite -- --nocapture --test-threads=1

      - name: Verify lifecycle outbox on PostgreSQL
        run: cargo test --locked --test feed_lifecycle_outbox postgres -- --nocapture --test-threads=1

      - name: Verify lifecycle outbox on MySQL
        run: cargo test --locked --test feed_lifecycle_outbox mysql -- --nocapture --test-threads=1

      - name: Verify entry queries on PostgreSQL
        run: cargo test --locked --test feed_query_contracts postgres -- --nocapture --test-threads=1

      - name: Verify entry queries on MySQL
        run: cargo test --locked --test feed_query_contracts mysql -- --nocapture --test-threads=1

      - name: Verify subscription projections on PostgreSQL
        run: cargo test --locked --all-features --test feed_subscription_contracts postgres -- --nocapture --test-threads=1

      - name: Verify subscription projections on MySQL
        run: cargo test --locked --all-features --test feed_subscription_contracts mysql -- --nocapture --test-threads=1

      - name: Verify terminal atomicity on PostgreSQL
        run: cargo test --locked --test feed_terminal_backend_contracts postgres -- --nocapture --test-threads=1

      - name: Verify terminal atomicity and lock order on MySQL
        run: cargo test --locked --test feed_terminal_backend_contracts mysql -- --nocapture --test-threads=1

      - name: Test PostgreSQL reader state contracts
        run: cargo test --locked --test feed_state_contracts postgres -- --nocapture --test-threads=1

      - name: Test MySQL reader state contracts
        run: cargo test --locked --test feed_state_contracts mysql -- --nocapture --test-threads=1

      - name: Run Rust tests
        run: env -u RAINDROP_TEST_POSTGRES_URL -u RAINDROP_TEST_MYSQL_URL cargo test --locked --workspace --all-features

  rust-current-stable:
    name: Rust current-stable compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install current stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable snapshot
        with:
          toolchain: stable

      - name: Check current stable compatibility
        run: cargo check --locked --all-targets --all-features

  rust-windows:
    name: Rust Windows durable replace
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable snapshot
        with:
          toolchain: 1.94.0
          targets: x86_64-pc-windows-msvc

      - name: Compile Windows durable replacement path
        run: cargo check --locked --target x86_64-pc-windows-msvc

  release-e2e:
    name: Release embedding and E2E
    needs: [supply-chain, web, rust]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 26.4.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable snapshot
        with:
          toolchain: 1.94.0

      - name: Restore Cargo cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            target
          key: ${{ runner.os }}-cargo-release-e2e-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}

      - name: Install pinned npm
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Verify npm version
        run: test "$(npm --version)" = "12.0.1"

      - name: Install locked web dependencies without scripts
        run: npm --prefix web ci --ignore-scripts

      - name: Install locked Playwright Chromium
        run: npm --prefix web run test:e2e:install-browser -- --with-deps

      - name: Run committed release and E2E gate
        run: npm --prefix web run test:e2e

      - name: Confirm lockfiles stayed frozen
        run: git diff --exit-code -- Cargo.lock web/package-lock.json

      - name: Verify release version
        run: ./target/release/raindrop --version

  container-smoke:
    name: Non-root container build and health
    needs: [supply-chain, web, rust]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build local smoke image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: raindrop:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify non-root startup and live health
        run: |
          set -euo pipefail
          container=raindrop-ci-smoke
          trap 'docker rm --force --volumes "$container" >/dev/null 2>&1 || true' EXIT
          docker run --detach --name "$container" \
            --publish 127.0.0.1::8080 \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            raindrop:ci >/dev/null

          test "$(docker inspect --format '{{.Config.User}}' "$container")" = "10001:10001"
          docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$container" \
            | grep -Fx 'RAINDROP_DATA_DIR=/data'
          docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$container" \
            | grep -Fx 'RAINDROP_BIND=0.0.0.0:8080'

          port="$(docker port "$container" 8080/tcp | sed -n 's/.*://p')"
          test -n "$port"
          for attempt in {1..60}; do
            health="$(docker inspect --format '{{.State.Health.Status}}' "$container")"
            if curl --fail --silent "http://127.0.0.1:${port}/api/v1/health/live" >/dev/null \
              && [[ "$health" == "healthy" ]]; then
              break
            fi
            test "$attempt" -lt 60
            sleep 1
          done
          test "$(docker inspect --format '{{.State.Health.Status}}' "$container")" = "healthy"
