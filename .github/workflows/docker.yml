name: Docker Build and Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: docker-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  source:
    name: Verify release source
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    outputs:
      build_time: ${{ steps.source.outputs.build_time }}
      release_tag: ${{ steps.source.outputs.release_tag }}
      sha: ${{ steps.source.outputs.sha }}
      short_sha: ${{ steps.source.outputs.short_sha }}
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Verify release source
        id: source
        run: |
          set -euo pipefail
          package_version="$(sed -n '/^\[package\]/,/^\[/ s/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$package_version"
          test "$RELEASE_TAG" = "v${package_version}"
          source_sha="$(git rev-parse HEAD)"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$source_sha"
          printf 'build_time=%s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          printf 'release_tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"
          printf 'short_sha=%s\n' "${source_sha:0:7}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }} image
    needs: source
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            platform_tag: amd64
            cache_scope: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform_tag: arm64
            cache_scope: arm64
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.source.outputs.release_tag }}
      SOURCE_SHA: ${{ needs.source.outputs.sha }}
      BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out verified source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.source.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Select public image names
        id: images
        env:
          PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: |
          set -euo pipefail
          images=("ghcr.io/${GITHUB_REPOSITORY,,}")
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            images+=("docker.io/czyt/raindrop")
          fi
          {
            printf 'images<<EOF\n'
            printf '%s\n' "${images[@]}"
            printf 'EOF\n'
            printf 'temporary_tags<<EOF\n'
            for image in "${images[@]}"; do
              printf '%s:build-%s-%s-%s\n' \
                "$image" "$SOURCE_SHA" "$BUILD_ID" "$PLATFORM_TAG"
            done
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ steps.images.outputs.images }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=raw,value=sha-${{ needs.source.outputs.short_sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push native image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.images.outputs.temporary_tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
            org.opencontainers.image.revision=${{ env.SOURCE_SHA }}
          secrets: |
            raindrop_official_plugin_signing_seed=${{ secrets.RAINDROP_OFFICIAL_PLUGIN_SIGNING_SEED }}
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
            BUILD_TIME=${{ needs.source.outputs.build_time }}
            GIT_COMMIT=${{ env.SOURCE_SHA }}
            RAINDROP_REQUIRE_OFFICIAL_PLUGIN_SIGNATURE=1
            RAINDROP_OFFICIAL_PLUGIN_SIGNING_KEY_ID=raindrop-release-2026
            RAINDROP_SIGNING_CACHE_EPOCH=${{ needs.source.outputs.build_time }}
          cache-from: type=gha,scope=raindrop-${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=raindrop-${{ matrix.cache_scope }}
          provenance: true
          sbom: true

  merge:
    name: Publish multi-platform image
    needs: [source, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.source.outputs.release_tag }}
      SOURCE_SHA: ${{ needs.source.outputs.sha }}
      BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Select public image names
        id: images
        run: |
          set -euo pipefail
          printf 'images<<EOF\n' >> "$GITHUB_OUTPUT"
          printf 'ghcr.io/%s\n' "${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            printf 'docker.io/czyt/raindrop\n' >> "$GITHUB_OUTPUT"
          fi
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ steps.images.outputs.images }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=raw,value=sha-${{ needs.source.outputs.short_sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create and verify multi-platform manifests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGES: ${{ steps.images.outputs.images }}
        run: |
          set -euo pipefail
          while IFS= read -r image; do
            [[ -n "$image" ]] || continue
            mapfile -t final_tags < <(
              jq -r --arg image "$image" \
                '.tags[] | select(startswith($image + ":"))' \
                <<< "$DOCKER_METADATA_OUTPUT_JSON"
            )
            test "${#final_tags[@]}" -gt 0
            tag_args=()
            for tag in "${final_tags[@]}"; do
              tag_args+=(--tag "$tag")
            done
            docker buildx imagetools create "${tag_args[@]}" \
              "${image}:build-${SOURCE_SHA}-${BUILD_ID}-amd64" \
              "${image}:build-${SOURCE_SHA}-${BUILD_ID}-arm64"
            docker buildx imagetools inspect --raw "${image}:${RELEASE_TAG#v}" \
              | jq -e '
                  [.manifests[]?.platform
                    | select(.os == "linux")
                    | .architecture] as $architectures
                  | [.manifests[]?
                      | select(
                          .annotations["vnd.docker.reference.type"]
                            == "attestation-manifest"
                        )] as $attestations
                  | ($architectures | index("amd64")) != null
                    and ($architectures | index("arm64")) != null
                    and ($attestations | length) >= 2
                ' >/dev/null
          done <<< "$IMAGES"
