name: Docker Build and Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

concurrency:
  group: docker-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build and push Raindrop image
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Verify release source
        id: source
        run: |
          set -euo pipefail
          package_version="$(sed -n '/^\[package\]/,/^\[/ s/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$package_version"
          test "$RELEASE_TAG" = "v${package_version}"
          source_sha="$(git rev-parse HEAD)"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$source_sha"
          printf 'sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"
          printf 'short_sha=%s\n' "${source_sha:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Select public image names
        id: images
        run: |
          set -euo pipefail
          printf 'images<<EOF\n' >> "$GITHUB_OUTPUT"
          printf 'ghcr.io/%s\n' "${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            printf 'czyt/raindrop\n' >> "$GITHUB_OUTPUT"
          fi
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=raw,value=sha-${{ steps.source.outputs.short_sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Compute build metadata
        id: buildmeta
        run: printf 'build_time=%s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
            BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
            GIT_COMMIT=${{ steps.source.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
