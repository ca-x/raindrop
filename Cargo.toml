[package]
name = "raindrop"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "A self-hosted, multi-user RSS reader"
repository = "https://github.com/czyt/raindrop"

[dependencies]
anyhow = "1.0.103"
axum = { version = "0.8.9", features = ["json", "macros"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
secrecy = "0.10.3"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["macros", "net", "rt-multi-thread", "signal"] }
toml = "0.9.8"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
url = { version = "2.5.7", features = ["serde"] }
uuid = { version = "1.24.0", features = ["v4"] }

[dev-dependencies]
http-body-util = "0.1.4"
tempfile = "3.27.0"
tower = { version = "0.5.3", features = ["util"] }

[profile.release]
lto = "thin"
strip = "symbols"
