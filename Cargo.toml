[package]
name = "raindrop"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "A self-hosted, multi-user RSS reader"
repository = "https://github.com/czyt/raindrop"

[dependencies]
anyhow = "1.0.103"
argon2 = { version = "0.5.3", features = ["std"] }
axum = { version = "0.8.9", features = ["json", "macros"] }
base64 = "0.22.1"
blake3 = "1.8.3"
cookie = "0.18.1"
constant_time_eq = "0.4.2"
feedparser-rs = { version = "=0.5.5", default-features = false }
mime_guess = "2.0.5"
rand_core = { version = "0.6.4", features = ["getrandom"] }
rust-embed = "8.12.0"
sea-orm = { version = "1.1.19", default-features = false, features = ["macros", "runtime-tokio-rustls", "sqlx-mysql", "sqlx-postgres", "sqlx-sqlite", "with-time"] }
sea-orm-migration = { version = "1.1.19", default-features = false, features = ["runtime-tokio-rustls", "sqlx-mysql", "sqlx-postgres", "sqlx-sqlite"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
secrecy = "0.10.3"
thiserror = "2.0.18"
time = { version = "0.3.53", features = ["formatting", "serde"] }
tokio = { version = "1.52.3", features = ["macros", "net", "rt-multi-thread", "signal"] }
toml = "0.9.8"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
url = { version = "2.5.7", features = ["serde"] }
uuid = { version = "1.24.0", features = ["v4"] }
zeroize = "1.8.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_Storage_FileSystem"] }

[dev-dependencies]
http-body-util = "0.1.4"
tempfile = "3.27.0"
tower = { version = "0.5.3", features = ["util"] }

[profile.release]
lto = "thin"
strip = "symbols"
